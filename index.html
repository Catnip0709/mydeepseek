<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <title>DeepSeek Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background:#000; color:#f5f5f7; -webkit-font-smoothing:antialiased; margin:0; padding:0; }
    * { -webkit-tap-highlight-color:transparent; box-sizing:border-box; }
    #chat { -webkit-overflow-scrolling:touch; scroll-behavior:smooth; }
    .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
    
    #input {
      min-height:44px;
      max-height:88px;
      line-height:1.4;
      overflow-y:auto;
      resize:none;
      border-radius:12px;
      padding:10px 12px;
    }
    .copy-btn {
      position: absolute;
      top:6px;
      right:6px;
      background:#333;
      color:#fff;
      border:none;
      border-radius:6px;
      padding:3px 6px;
      font-size:12px;
      opacity:0.6;
    }
    .copy-btn:hover { opacity:1; }
    .message-box { position:relative; }
    .tab { padding:6px 10px; border-radius:8px; cursor:pointer; font-size:14px; }
    .tab.active { background:#007aff; color:white; }
    .tab:hover { background:#222; }
    .active.tab:hover { background:#007aff; }
  </style>
</head>
<body class="max-w-full mx-0 safe-area-bottom">

<!-- 顶部：多对话切换栏 -->
<div class="fixed top-0 left-0 right-0 bg-black/95 z-20 p-2 border-b border-gray-800">
  <div class="flex items-center gap-2 overflow-x-auto pb-1">
    <div id="tabs" class="flex gap-2"></div>
    <button id="addTab" class="text-white bg-gray-700 px-3 py-1 rounded-lg">+</button>
  </div>
  <div class="flex justify-between items-center px-2 mt-1">
    <h1 class="text-lg font-medium text-white m-0">DeepSeek</h1>
    <button id="resetBtn" class="bg-red-600/90 px-3 py-1 rounded-lg text-sm">重置当前对话</button>
  </div>
</div>

<!-- 聊天区域 -->
<div id="chat" class="pt-24 pb-28 px-4 h-screen overflow-y-auto space-y-4 bg-black"></div>

<!-- 输入框（已删除复制输入按钮）-->
<div class="fixed bottom-0 left-0 right-0 bg-black/90 backdrop-blur px-4 py-3 border-t border-gray-800 safe-area-bottom z-10">
  <div class="flex gap-2 items-end">
    <textarea id="input" class="flex-1 bg-gray-800 border border-gray-700 text-white text-base" placeholder="输入消息..." rows="1"></textarea>
    <button id="sendBtn" class="bg-blue-500 px-4 py-3 rounded-lg text-white h-[44px]">发送</button>
  </div>
</div>

<!-- API Key 弹窗 -->
<div id="keyPanel" class="fixed inset-0 bg-black/95 flex items-center justify-center z-50 hidden">
  <div class="bg-gray-900 p-6 rounded-2xl w-[90%] max-w-sm border border-gray-700">
    <h3 class="text-white mb-3">输入 API Key</h3>
    <input id="apiKeyInput" class="w-full p-3 bg-gray-800 rounded border border-gray-700 text-white mb-3">
    <button id="saveKey" class="w-full bg-blue-500 py-3 rounded text-white">保存</button>
  </div>
</div>

<script>
let apiKey = localStorage.getItem("dsApiKey");
let tabData = JSON.parse(localStorage.getItem("dsTabs")) || {
  active: "tab1",
  list: { tab1: [] }
};

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const tabsEl = document.getElementById("tabs");
const addTab = document.getElementById("addTab");
const resetBtn = document.getElementById("resetBtn");
const keyPanel = document.getElementById("keyPanel");
const apiKeyInput = document.getElementById("apiKeyInput");
const saveKey = document.getElementById("saveKey");

if (!apiKey) keyPanel.classList.remove("hidden");

saveKey.onclick = () => {
  apiKey = apiKeyInput.value.trim();
  if (!apiKey) return alert("请输入Key");
  localStorage.setItem("dsApiKey", apiKey);
  keyPanel.classList.add("hidden");
};

function saveTabs() {
  localStorage.setItem("dsTabs", JSON.stringify(tabData));
}

function renderTabs() {
  tabsEl.innerHTML = "";
  Object.keys(tabData.list).forEach(id => {
    let div = document.createElement("div");
    div.className = "tab " + (id === tabData.active ? "active" : "");
    div.innerText = id.replace("tab", "对话 ");
    div.onclick = () => {
      tabData.active = id;
      saveTabs();
      render();
      renderTabs();
    };
    tabsEl.appendChild(div);
  });
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => alert("复制成功！")).catch(e => alert("失败"));
}

function render() {
  let ms = tabData.list[tabData.active] || [];
  chat.innerHTML = ms.map((m, i) => `
    <div class="message-box p-3 rounded-xl ${m.role==='user'?'bg-blue-600 ml-auto':'bg-gray-800 mr-auto'} max-w-[85%] text-white">
      <button class="copy-btn" onclick="copyText(\`${(m.content||'').replace(/`/g,'')}\`)">复制</button>
      ${(m.content||'').replace(/\n/g,'<br>')}
    </div>
  `).join("");
}

function autoHeight() {
  input.style.height = "auto";
  let h = input.scrollHeight;
  input.style.height = Math.min(Math.max(h,44),88)+"px";
}
input.addEventListener("input", autoHeight);

addTab.onclick = () => {
  let newId = "tab" + (Object.keys(tabData.list).length + 1);
  tabData.list[newId] = [];
  tabData.active = newId;
  saveTabs();
  render();
  renderTabs();
};

resetBtn.onclick = () => {
  if (!confirm("清空当前对话？")) return;
  tabData.list[tabData.active] = [];
  saveTabs();
  render();
};

async function send() {
  const text = input.value.trim();
  if (!text || !apiKey) return;
  let arr = tabData.list[tabData.active] || [];
  arr.push({ role:"user", content:text });
  tabData.list[tabData.active] = arr;
  saveTabs();
  render();
  input.value = "";
  autoHeight();

  const isAtBottom = chat.scrollTop + chat.clientHeight >= chat.scrollHeight - 20;
  const msgDiv = document.createElement("div");
  msgDiv.className = "message-box p-3 rounded-xl bg-gray-800 mr-auto max-w-[85%] text-white";
  chat.appendChild(msgDiv);
  if (isAtBottom) chat.scrollTop = chat.scrollHeight;

  let full = "";
  try {
    const res = await fetch("https://api.deepseek.com/v1/chat/completions", {
      method:"POST", headers:{
        "Content-Type":"application/json",
        "Authorization":`Bearer ${apiKey}`
      },
      body:JSON.stringify({
        model:"deepseek-chat",
        messages:arr,
        stream:true,
        temperature:0.7,
        max_tokens:4096
      })
    });
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    while (1) {
      const { done, value } = await reader.read();
      if (done) break;
      const lines = dec.decode(value).split("\n");
      for (let line of lines) {
        line = line.trim();
        if (!line.startsWith("data: ")) continue;
        let j = line.slice(6);
        if (j === "[DONE]") break;
        try {
          let d = JSON.parse(j);
          let c = d.choices[0].delta.content || "";
          full += c;
          msgDiv.innerHTML = `
            <button class="copy-btn" onclick="copyText(\`${full.replace(/`/g,'')}\`)">复制</button>
            ${full.replace(/\n/g,'<br>')}
          `;
          let curBottom = chat.scrollTop + chat.clientHeight >= chat.scrollHeight - 20;
          if (curBottom) chat.scrollTop = chat.scrollHeight;
        } catch(e){}
      }
    }
    arr.push({ role:"assistant", content:full });
    saveTabs();
    render();
  } catch (e) {
    msgDiv.innerHTML = `<span class="text-red-400">错误</span>`;
  }
}

sendBtn.onclick = send;
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

renderTabs();
render();
autoHeight();
</script>
</body>
</html>
