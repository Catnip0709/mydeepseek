<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <title>DeepSeek Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background:#000; color:#f5f5f7; -webkit-font-smoothing:antialiased; margin:0; padding:0; }
    * { -webkit-tap-highlight-color:transparent; box-sizing:border-box; }
    #chat { -webkit-overflow-scrolling:touch; scroll-behavior:smooth; }
    .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
    #input {
      min-height:44px;
      max-height:88px;
      line-height:1.4;
      overflow-y:auto;
      resize:none;
      border-radius:12px;
      padding:10px 12px;
    }
    .copy-btn {
      position: absolute;
      bottom:6px;
      right:6px;
      background:rgba(51,51,51,0.8);
      color:#fff;
      border:none;
      border-radius:6px;
      padding:2px 5px;
      font-size:10px;
      opacity:0.7;
      z-index:5;
    }
    .copy-btn:hover { opacity:1; }
    /* 新增：重新生成按钮样式 */
    .regenerate-btn {
      position: absolute;
      bottom:6px;
      right:40px; /* 放在复制按钮左边 */
      background:rgba(51,51,51,0.6);
      color:#fff;
      border:none;
      border-radius:6px;
      padding:2px 5px;
      font-size:10px;
      opacity:0.5;
      z-index:5;
      width:24px;
      height:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition: all 0.2s ease;
    }
    .regenerate-btn:hover {
      opacity:0.8;
      background:rgba(51,51,51,0.8);
    }
    .regenerate-btn:active {
      transform: scale(0.95);
    }
    .message-box {
      position:relative;
      padding-bottom:20px !important;
    }
    .tab {
      padding:6px 10px;
      border-radius:8px;
      cursor:pointer;
      font-size:14px;
      display:flex;
      align-items:center;
      gap:6px;
      background:#333;
    }
    .tab.active { background:#007aff; color:white; }
    .tab:hover { background:#444; }
    .active.tab:hover { background:#007aff; }
    .tab-del {
      font-size:12px;
      width:16px;
      height:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:50%;
      background:rgba(255,255,255,0.2);
      cursor:pointer;
    }
    .tab-del:hover {
      background:rgba(255,255,255,0.4);
    }
  </style>
</head>
<body class="max-w-full mx-0 safe-area-bottom">

<div class="fixed top-0 left-0 right-0 bg-black/95 z-20 p-2 border-b border-gray-800">
  <div class="flex items-center gap-2 overflow-x-auto pb-1" style="scrollbar-width: none;-ms-overflow-style: none;">
    <div id="tabs" class="flex gap-2"></div>
    <button id="addTab" class="text-white bg-gray-700 px-3 py-1 rounded-lg flex-shrink-0">+ 新建对话</button>
  </div>
  <div class="flex justify-between items-center px-2 mt-1">
    <h1 class="text-lg font-medium text-white m-0">DeepSeek Chat</h1>
    <div class="flex gap-2">
      <!-- 移除了重新生成按钮 -->
      <button id="editKeyBtn" class="bg-purple-600/90 px-3 py-1 rounded-lg text-sm">修改API Key</button>
      <button id="resetBtn" class="bg-red-600/90 px-3 py-1 rounded-lg text-sm">清空当前对话</button>
    </div>
  </div>
</div>

<div id="chat" class="pt-24 pb-28 px-4 h-screen overflow-y-auto space-y-4 bg-black"></div>

<div class="fixed bottom-0 left-0 right-0 bg-black/90 backdrop-blur px-4 py-3 border-t border-gray-800 safe-area-bottom z-10">
  <div class="flex gap-2 items-end">
    <textarea id="input" class="flex-1 bg-gray-800 border border-gray-700 text-white text-base" placeholder="输入消息..." rows="1"></textarea>
    <button id="sendBtn" class="bg-blue-500 px-4 py-3 rounded-lg text-white h-[44px] flex-shrink-0">发送</button>
  </div>
</div>

<div id="keyPanel" class="fixed inset-0 bg-black/95 flex items-center justify-center z-50 hidden">
  <div class="bg-gray-900 p-6 rounded-2xl w-[90%] max-w-sm border border-gray-700">
    <h3 class="text-white mb-3">输入/修改 DeepSeek API Key</h3>
    <input id="apiKeyInput" class="w-full p-3 bg-gray-800 rounded border border-gray-700 text-white mb-3" placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
    <button id="saveKey" class="w-full bg-blue-500 py-3 rounded text-white">保存</button>
  </div>
</div>

<script>
let apiKey = localStorage.getItem("dsApiKey");
let tabData = JSON.parse(localStorage.getItem("dsTabs")) || (() => {
  const oldMsgs = JSON.parse(localStorage.getItem("dsMessages")) || [];
  return { active: "tab1", list: { tab1: oldMsgs } };
})();

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const tabsEl = document.getElementById("tabs");
const addTab = document.getElementById("addTab");
const resetBtn = document.getElementById("resetBtn");
const keyPanel = document.getElementById("keyPanel");
const apiKeyInput = document.getElementById("apiKeyInput");
const saveKey = document.getElementById("saveKey");
const editKeyBtn = document.getElementById("editKeyBtn");

if (!apiKey) {
  keyPanel.classList.remove("hidden");
} else {
  apiKeyInput.value = apiKey;
}

saveKey.onclick = () => {
  const newKey = apiKeyInput.value.trim();
  if (!newKey || !newKey.startsWith("sk-")) {
    return alert("请输入有效的以sk-开头的API Key！");
  }
  if (newKey.length < 20) {
    alert("API Key长度过短，可能是无效的Key，请检查！");
    return;
  }
  apiKey = newKey;
  localStorage.setItem("dsApiKey", apiKey);
  keyPanel.classList.add("hidden");
  alert("Key保存成功，可正常使用！");
};

editKeyBtn.onclick = () => {
  apiKeyInput.value = apiKey || "";
  keyPanel.classList.remove("hidden");
  apiKeyInput.focus();
};

function saveTabs() {
  localStorage.setItem("dsTabs", JSON.stringify(tabData));
}

function renderTabs() {
  tabsEl.innerHTML = "";
  const tabIds = Object.keys(tabData.list);
  if (tabIds.length === 0) {
    tabData.list = { tab1: [] };
    tabData.active = "tab1";
    saveTabs();
  }
  Object.keys(tabData.list).forEach(id => {
    const tabDiv = document.createElement("div");
    tabDiv.className = `tab ${id === tabData.active ? "active" : ""} flex-shrink-0`;
    tabDiv.innerHTML = `
      <span>对话 ${id.replace("tab", "")}</span>
      <span class="tab-del" data-id="${id}">×</span>
    `;
    tabDiv.addEventListener("click", (e) => {
      if (e.target.classList.contains("tab-del")) return;
      tabData.active = id;
      saveTabs();
      renderChat();
      renderTabs();
    });
    tabsEl.appendChild(tabDiv);
  });
  document.querySelectorAll(".tab-del").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const delId = btn.dataset.id;
      const tabIds = Object.keys(tabData.list);
      if (tabIds.length <= 1) {
        alert("至少保留1个对话，无法删除！");
        return;
      }
      if (confirm(`确定删除「对话 ${delId.replace("tab", "")}」吗？删除后记录将永久消失！`)) {
        delete tabData.list[delId];
        if (delId === tabData.active) {
          tabData.active = Object.keys(tabData.list)[0];
        }
        saveTabs();
        renderChat();
        renderTabs();
      }
    });
  });
}

function copyText(text) {
  if (!text) return alert("暂无内容可复制");
  navigator.clipboard.writeText(text).then(() => {
    alert("复制成功！");
  }).catch(err => {
    alert("复制失败，请手动复制！");
    console.error("复制错误：", err);
  });
}

// 渲染聊天记录
function renderChat() {
  const currentMsgs = tabData.list[tabData.active] || [];
  chat.innerHTML = currentMsgs.map((m, i) => {
    const isUser = m.role === 'user';
    const isAssistant = m.role === 'assistant';
    const isLastAssistant = isAssistant && i === currentMsgs.length - 1;
    
    let buttons = '';
    if (isAssistant) {
      // 所有AI回复都有复制按钮
      buttons += `<button class="copy-btn" onclick="copyText(\`${(m.content||'').replace(/`/g, '\\`')}\`)">复制</button>`;
      
      // 只有最后一条AI回复显示重新生成按钮
      if (isLastAssistant) {
        buttons += `<button class="regenerate-btn" onclick="regenerateResponse(${i})" title="重新生成">↻</button>`;
      }
    } else if (isUser) {
      // 用户消息只有复制按钮
      buttons += `<button class="copy-btn" onclick="copyText(\`${(m.content||'').replace(/`/g, '\\`')}\`)">复制</button>`;
    }
    
    return `
      <div class="message-box p-3 rounded-xl ${isUser?'bg-blue-600 ml-auto':'bg-gray-800 mr-auto'} max-w-[85%] text-white">
        ${buttons}
        ${(m.content||'').replace(/\n/g, '<br>')}
      </div>
    `;
  }).join("");
  chat.scrollTop = chat.scrollHeight;
}

function autoHeight() {
  input.style.height = "auto";
  const scrollH = input.scrollHeight;
  input.style.height = Math.min(Math.max(scrollH, 44), 88) + "px";
}
input.addEventListener("input", autoHeight);
autoHeight();

addTab.onclick = () => {
  const tabIds = Object.keys(tabData.list);
  let maxIdNum = 0;
  tabIds.forEach(id => {
    const num = parseInt(id.replace('tab', ''), 10);
    if (num > maxIdNum) {
      maxIdNum = num;
    }
  });
  const newId = `tab${maxIdNum + 1}`;
  tabData.list[newId] = [];
  tabData.active = newId;
  saveTabs();
  renderChat();
  renderTabs();
  input.focus();
};

resetBtn.onclick = () => {
  if (!confirm("确定清空当前对话的所有记录吗？清空后无法恢复！")) return;
  tabData.list[tabData.active] = [];
  saveTabs();
  renderChat();
};

// 重新生成回复的函数
async function regenerateResponse(messageIndex) {
  if (!apiKey) {
    keyPanel.classList.remove("hidden");
    return;
  }
  
  const currentMsgs = tabData.list[tabData.active] || [];
  if (currentMsgs.length === 0) {
    return alert("当前对话为空，无法重新生成。");
  }

  // 检查要重新生成的消息是否是AI回复
  if (messageIndex < 0 || messageIndex >= currentMsgs.length) {
    return alert("消息索引无效。");
  }
  
  const targetMessage = currentMsgs[messageIndex];
  if (targetMessage.role !== 'assistant') {
    return alert("只能重新生成AI的回复。");
  }

  // 移除该AI回复及其之后的所有消息（保持对话上下文连贯）
  // 例如：用户1 -> AI1 -> 用户2 -> AI2，重新生成AI2时，只移除AI2
  const messagesToKeep = currentMsgs.slice(0, messageIndex);
  tabData.list[tabData.active] = messagesToKeep;
  saveTabs();
  renderChat();

  // 重新发起请求
  await fetchAndStreamResponse();
}

// API请求和流式处理封装函数
async function fetchAndStreamResponse() {
  const currentMsgs = tabData.list[tabData.active] || [];
  const isAtBottom = chat.scrollTop + chat.clientHeight >= chat.scrollHeight - 20;

  const aiMsgDiv = document.createElement("div");
  aiMsgDiv.className = "message-box p-3 rounded-xl bg-gray-800 mr-auto max-w-[85%] text-white";
  aiMsgDiv.innerHTML = '<button class="copy-btn" onclick="copyText(\'\')">复制</button>';
  chat.appendChild(aiMsgDiv);

  if (isAtBottom) chat.scrollTop = chat.scrollHeight;

  let fullContent = "";
  try {
    const res = await fetch("https://api.deepseek.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${apiKey}`,
        "Cache-Control": "no-cache",
        "Pragma": "no-cache"
      },
      body: JSON.stringify({
        model: "deepseek-chat",
        messages: currentMsgs,
        stream: true,
        temperature: 0.7,
        max_tokens: 4096
      })
    });

    if (!res.ok) {
      const errorData = await res.json();
      throw new Error(`API请求失败：${errorData.error?.message || '请检查API Key是否有效'}`);
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      const lines = chunk.split("\n").filter(line => line.trim() !== "");
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const dataStr = line.slice(6);
        if (dataStr === "[DONE]") break;
        try {
          const data = JSON.parse(dataStr);
          const content = data.choices[0].delta.content || "";
          fullContent += content;
          aiMsgDiv.innerHTML = `
            <button class="copy-btn" onclick="copyText(\`${fullContent.replace(/`/g, '\\`')}\`)">复制</button>
            ${fullContent.replace(/\n/g, '<br>')}
          `;
          const currentIsAtBottom = chat.scrollTop + chat.clientHeight >= chat.scrollHeight - 20;
          if (currentIsAtBottom) {
            chat.scrollTop = chat.scrollHeight;
          }
        } catch (e) {
          continue;
        }
      }
    }
    currentMsgs.push({ role: "assistant", content: fullContent });
    tabData.list[tabData.active] = currentMsgs;
    saveTabs();
    renderChat();
  } catch (e) {
    aiMsgDiv.innerHTML = `<span class="text-red-400">❌ 错误：${e.message}</span>`;
    console.error("发送消息错误：", e);
    if (e.message.includes("API请求失败") || e.message.includes("Key")) {
      setTimeout(() => {
        if (confirm("检测到API Key可能无效，是否立即修改？")) {
          editKeyBtn.click();
        }
      }, 1000);
    }
  }
}

// 发送消息函数
async function sendMessage() {
  const text = input.value.trim();
  if (!text) {
    input.focus();
    return;
  }
  if (!apiKey) {
    keyPanel.classList.remove("hidden");
    return;
  }

  const currentMsgs = tabData.list[tabData.active] || [];
  currentMsgs.push({ role: "user", content: text });
  tabData.list[tabData.active] = currentMsgs;
  saveTabs();
  renderChat();

  input.value = "";
  autoHeight();

  await fetchAndStreamResponse();
}

// 绑定事件
sendBtn.onclick = sendMessage;
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    if (e.shiftKey) return;
    e.preventDefault();
    sendMessage();
  }
});

// 初始化渲染
renderTabs();
renderChat();
</script>
</body>
</html>
