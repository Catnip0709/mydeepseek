<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <title>DeepSeek Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background:#000; color:#f5f5f7; -webkit-font-smoothing:antialiased; margin:0; padding:0; }
    * { -webkit-tap-highlight-color:transparent; box-sizing:border-box; }
    #chat { -webkit-overflow-scrolling:touch; scroll-behavior:smooth; }
    .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
    
    #input {
      min-height:44px;
      max-height:88px;
      line-height:1.4;
      overflow-y:auto;
      resize:none;
      border-radius:12px;
      padding:10px 12px;
    }
    .copy-btn {
      position: absolute;
      top:6px;
      right:6px;
      background:#333;
      color:#fff;
      border:none;
      border-radius:6px;
      padding:3px 6px;
      font-size:12px;
      opacity:0.6;
    }
    .copy-btn:hover { opacity:1; }
    .message-box {
      position:relative;
    }
  </style>
</head>
<body class="max-w-full mx-0 safe-area-bottom">
<div class="fixed top-0 left-0 right-0 bg-black/85 backdrop-blur z-10 px-4 py-3 flex justify-between items-center border-b border-gray-800">
  <h1 class="text-lg font-medium text-white">DeepSeek</h1>
  <button id="resetBtn" class="bg-red-600/90 px-3 py-1 rounded-lg text-sm">重置对话</button>
</div>

<div id="chat" class="pt-16 pb-28 px-4 h-screen overflow-y-auto space-y-4 bg-black"></div>

<div class="fixed bottom-0 left-0 right-0 bg-black/90 backdrop-blur px-4 py-3 border-t border-gray-800 safe-area-bottom z-10">
  <div class="flex gap-2 items-end">
    <textarea id="input" class="flex-1 bg-gray-800 border border-gray-700 text-white text-base" placeholder="输入消息..." rows="1"></textarea>
    <button id="copyInputBtn" class="bg-gray-700 px-2 py-2 rounded-lg text-white text-xs">复制输入</button>
    <button id="sendBtn" class="bg-blue-500 px-4 py-3 rounded-lg text-white h-[44px]">发送</button>
  </div>
</div>

<div id="keyPanel" class="fixed inset-0 bg-black/95 flex items-center justify-center z-50 hidden">
  <div class="bg-gray-900 p-6 rounded-2xl w-[90%] max-w-sm border border-gray-700">
    <h3 class="text-white mb-3">输入 API Key</h3>
    <input id="apiKeyInput" class="w-full p-3 bg-gray-800 rounded border border-gray-700 text-white mb-3">
    <button id="saveKey" class="w-full bg-blue-500 py-3 rounded text-white">保存</button>
  </div>
</div>

<script>
let apiKey = localStorage.getItem("dsApiKey");
let messages = JSON.parse(localStorage.getItem("dsMessages")) || [];

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const copyInputBtn = document.getElementById("copyInputBtn");
const keyPanel = document.getElementById("keyPanel");
const apiKeyInput = document.getElementById("apiKeyInput");
const saveKey = document.getElementById("saveKey");
const resetBtn = document.getElementById("resetBtn");

if (!apiKey) keyPanel.classList.remove("hidden");

saveKey.onclick = () => {
  apiKey = apiKeyInput.value.trim();
  if (!apiKey) return alert("请输入Key");
  localStorage.setItem("dsApiKey", apiKey);
  keyPanel.classList.add("hidden");
};

resetBtn.onclick = () => {
  if (confirm("清空对话？")) {
    messages = [];
    localStorage.removeItem("dsMessages");
    chat.innerHTML = "";
  }
};

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => {
    alert("复制成功！");
  }).catch(err => {
    alert("复制失败：" + err);
  });
}

function render() {
  chat.innerHTML = messages.map((m, idx) => `
    <div class="message-box p-3 rounded-xl ${m.role==='user' ? 'bg-blue-600 ml-auto' : 'bg-gray-800 mr-auto'} max-w-[85%] text-white">
      <button class="copy-btn" onclick="copyText(\`${m.content.replace(/`/g,'')}\`)">复制</button>
      ${m.content.replace(/\n/g,'<br>')}
    </div>
  `).join("");
}

function autoHeight() {
  input.style.height = "auto";
  let h = input.scrollHeight;
  input.style.height = Math.min(Math.max(h, 44), 88) + "px";
}

input.addEventListener("input", autoHeight);
copyInputBtn.onclick = () => copyText(input.value);

async function send() {
  const text = input.value.trim();
  if (!text || !apiKey) return;
  
  messages.push({role:"user",content:text});
  render();
  input.value = "";
  autoHeight();

  // 只有在最底部才自动跟随
  const isAtBottom = chat.scrollTop + chat.clientHeight >= chat.scrollHeight - 20;

  const msgDiv = document.createElement("div");
  msgDiv.className = "message-box p-3 rounded-xl bg-gray-800 mr-auto max-w-[85%] text-white";
  chat.appendChild(msgDiv);

  // 初始只定位一次
  if (isAtBottom) {
    chat.scrollTop = chat.scrollHeight;
  }

  let fullText = "";
  try {
    const res = await fetch("https://api.deepseek.com/v1/chat/completions", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":`Bearer ${apiKey}`
      },
      body:JSON.stringify({
        model:"deepseek-chat",
        messages:messages,
        stream:true,
        temperature:0.7,
        max_tokens:4096
      })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const {done,value} = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      const lines = chunk.split("\n");
      
      for (let line of lines) {
        line = line.trim();
        if (!line || !line.startsWith("data: ")) continue;
        const json = line.slice(6);
        if (json === "[DONE]") break;
        
        try {
          const data = JSON.parse(json);
          const c = data.choices[0].delta.content || "";
          fullText += c;

          // 流式输出时更新内容
          msgDiv.innerHTML = `
            <button class="copy-btn" onclick="copyText(\`${fullText.replace(/`/g,'')}\`)">复制</button>
            ${fullText.replace(/\n/g,'<br>')}
          `;

          // 关键修复：只有本来就在底部，才滚动
          const currentIsAtBottom = chat.scrollTop + chat.clientHeight >= chat.scrollHeight - 20;
          if (currentIsAtBottom) {
            chat.scrollTop = chat.scrollHeight;
          }

        } catch(e) {}
      }
    }

    messages.push({role:"assistant",content:fullText});
    localStorage.setItem("dsMessages", JSON.stringify(messages));
    render();

    // 最后再判断一次
    if (chat.scrollTop + chat.clientHeight >= chat.scrollHeight - 20) {
      chat.scrollTop = chat.scrollHeight;
    }

  } catch (e) {
    msgDiv.innerHTML = `<span class="text-red-400">错误：${e.message}</span>`;
  }
}

sendBtn.onclick = send;
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

render();
autoHeight();
</script>
</body>
</html>
