<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <title>DeepSeek Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background:#000; color:#f5f5f7; -webkit-font-smoothing:antialiased; margin:0; padding:0; overflow-x: hidden; }
    * { -webkit-tap-highlight-color:transparent; box-sizing:border-box; }
    #chat { -webkit-overflow-scrolling:touch; scroll-behavior:smooth; }
    .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }

    #input {
      min-height:44px;
      max-height:88px;
      line-height:1.4;
      overflow-y:auto;
      resize:none;
      border-radius:12px;
      padding:10px 12px;
      border: 1px solid #4b5563;
    }

    #sendBtn {
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0 16px;
      height: 44px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #sendBtn:hover { background: #2563eb; }
    #sendBtn:active { background: #1d4ed8; transform: scale(0.98); }
    #sendBtn:disabled { background: #6b7280; cursor: not-allowed; }

    /* 停止生成按钮样式 */
    #sendBtn.stop-mode {
      background: #ef4444; /* red-500 */
    }
    #sendBtn.stop-mode:hover {
      background: #dc2626; /* red-600 */
    }

    .copy-btn, .regenerate-btn, .edit-btn, .delete-btn {
      position: absolute;
      bottom:6px;
      background:rgba(51,51,51,0.6);
      color:#fff;
      border:none;
      border-radius:6px;
      padding:2px 5px;
      font-size:12px;
      opacity:0.5;
      z-index:5;
      cursor: pointer;
      transition: all 0.2s ease;
      height:24px;
      width:24px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .copy-btn { right:6px; }
    .regenerate-btn { right:36px; }
    .edit-btn { right:36px; }
    .delete-btn { right:66px; }

    .copy-btn:hover, .regenerate-btn:hover, .edit-btn:hover, .delete-btn:hover {
      opacity:1; background:rgba(51,51,51,0.8);
    }
    .delete-btn:hover { background:rgba(220,38,38,0.8); }
    .copy-btn:active, .regenerate-btn:active, .edit-btn:active, .delete-btn:active { transform: scale(0.95); }

    .message-box {
      position:relative;
      padding-bottom:32px !important;
      min-width: 60px;
    }

    /* 历史版本控制样式 */
    .version-control {
      position: absolute;
      bottom: 6px;
      left: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #d1d5db;
      background: rgba(51,51,51,0.6);
      padding: 2px 8px;
      border-radius: 6px;
      z-index: 5;
      height: 24px;
    }
    .version-btn {
      cursor: pointer;
      transition: color 0.2s;
      user-select: none;
    }
    .version-btn:hover { color: #fff; }
    .version-btn.disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

    /* 侧边栏对话列表项样式 */
    .tab {
      padding:10px 12px;
      border-radius:8px;
      cursor:pointer;
      font-size:14px;
      display:flex;
      align-items:center;
      justify-content: space-between;
      background:transparent;
      color: #d1d5db;
      transition: background 0.2s;
    }

    .tab.active { background:#3b82f6; color:white; }
    .tab:hover:not(.active) { background:#374151; }

    .tab-del {
      font-size:14px;
      width:20px;
      height:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:50%;
      background:rgba(255,255,255,0.1);
      cursor:pointer;
    }
    .tab-del:hover { background:rgba(255,255,255,0.3); }

    /* 编辑面板样式 */
    .edit-panel {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .edit-panel.hidden { display: none; }
    .edit-container {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 20px;
      width: 90%;
      max-width: 500px;
      border: 1px solid #333;
    }
    .edit-textarea {
      width: 100%;
      min-height: 150px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 12px;
      color: white;
      font-size: 14px;
      line-height: 1.5;
      resize: vertical;
      margin-bottom: 15px;
    }
    .edit-buttons { display: flex; gap: 10px; justify-content: flex-end; }
    .edit-btn-save, .edit-btn-cancel {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }
    .edit-btn-save { background: #007aff; color: white; }
    .edit-btn-cancel { background: #444; color: white; }

    /* 快速到底部按钮 */
    .scroll-to-bottom-btn {
      position: fixed;
      bottom: 100px;
      right: 20px;
      width: 40px;
      height: 40px;
      background: rgba(51, 51, 51, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      color: white;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.2s ease;
      z-index: 15;
      backdrop-filter: blur(4px);
      pointer-events: none;
    }
    .scroll-to-bottom-btn.visible { opacity: 0.7; pointer-events: auto; }
    .scroll-to-bottom-btn:hover { opacity: 0.9; background: rgba(51, 51, 51, 0.9); transform: scale(1.05); }
    .scroll-to-bottom-btn:active { transform: scale(0.95); }

    /* 底部输入区域 */
    .input-container {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      padding: 12px 16px;
      border-top: 1px solid rgba(75, 85, 99, 0.5);
      z-index: 10;
    }
    .input-wrapper {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      max-width: 800px;
      margin: 0 auto;
    }

    /* 隐藏数字输入框的上下箭头 */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
  </style>
</head>
<body class="max-w-full mx-0 safe-area-bottom">

<!-- 顶部导航栏 -->
<div class="fixed top-0 left-0 right-0 bg-black/95 z-20 p-3 border-b border-gray-800 flex items-center justify-between">
  <button id="menuBtn" class="text-white text-2xl px-2 leading-none focus:outline-none">☰</button>
  <h1 class="text-lg font-medium text-white m-0 absolute left-1/2 transform -translate-x-1/2">DeepSeek Chat</h1>
  <div class="w-8"></div> <!-- 占位，保持标题居中 -->
</div>

<!-- 侧边栏遮罩 -->
<div id="sidebarOverlay" class="fixed inset-0 bg-black/60 z-30 opacity-0 pointer-events-none transition-opacity duration-300"></div>

<!-- 侧边栏 -->
<div id="sidebar" class="fixed top-0 left-0 bottom-0 w-64 bg-gray-900 z-40 transform -translate-x-full transition-transform duration-300 flex flex-col border-r border-gray-800">
  <div class="p-4 border-b border-gray-800 mt-4">
    <button id="addTab" class="w-full text-white bg-blue-600 hover:bg-blue-700 py-2 rounded-lg flex items-center justify-center gap-2 transition-colors">
      <span class="text-xl leading-none">+</span> 新建对话
    </button>
  </div>

  <!-- 对话列表 -->
  <div id="tabs" class="flex-1 overflow-y-auto p-2 space-y-1" style="scrollbar-width: none;-ms-overflow-style: none;"></div>

  <!-- 底部操作区 -->
  <div class="p-4 border-t border-gray-800 space-y-3">
    <!-- 记忆条数设置 -->
    <div>
      <div class="text-xs text-gray-400 mb-1 ml-1">当前对话记忆条数</div>
      <div class="flex gap-2">
        <select id="memorySelect" class="bg-gray-800 text-white border border-gray-700 rounded-lg p-2 flex-1 text-sm outline-none focus:border-blue-500">
          <option value="0">全部 (默认)</option>
          <option value="200">200条</option>
          <option value="100">100条</option>
          <option value="50">50条</option>
          <option value="custom">自定义</option>
        </select>
        <input type="number" id="memoryCustom" class="bg-gray-800 text-white border border-gray-700 rounded-lg p-2 w-16 text-sm outline-none focus:border-blue-500 hidden text-center" placeholder="条数" min="1">
      </div>
    </div>

    <button id="editKeyBtn" class="w-full bg-gray-700 hover:bg-gray-600 py-2 rounded-lg text-sm text-white transition-colors">修改API Key</button>
    <button id="resetBtn" class="w-full bg-red-600/90 hover:bg-red-600 py-2 rounded-lg text-sm text-white transition-colors">清空当前对话</button>
  </div>
</div>

<!-- 聊天区域 -->
<div id="chat" class="pt-16 pb-32 px-4 h-screen overflow-y-auto space-y-4 bg-black"></div>

<!-- 快速到底部按钮 -->
<button id="scrollToBottomBtn" class="scroll-to-bottom-btn" title="快速到底部">↓</button>

<!-- 底部输入区域 -->
<div class="input-container safe-area-bottom">
  <div class="input-wrapper">
    <textarea id="input" class="flex-1 bg-gray-800 border border-gray-700 text-white text-base" placeholder="输入消息..." rows="1"></textarea>
    <button id="sendBtn">发送</button>
  </div>
</div>

<!-- API Key 设置面板 -->
<div id="keyPanel" class="fixed inset-0 bg-black/95 flex items-center justify-center z-50 hidden">
  <div class="bg-gray-900 p-6 rounded-2xl w-[90%] max-w-sm border border-gray-700">
    <h3 class="text-white mb-3">输入/修改 DeepSeek API Key</h3>
    <input id="apiKeyInput" class="w-full p-3 bg-gray-800 rounded border border-gray-700 text-white mb-3" placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
    <button id="saveKey" class="w-full bg-blue-500 py-3 rounded text-white">保存</button>
  </div>
</div>

<!-- 消息编辑面板 -->
<div id="editPanel" class="edit-panel hidden">
  <div class="edit-container">
    <h3 class="text-white mb-3">编辑消息</h3>
    <textarea id="editTextarea" class="edit-textarea" placeholder="编辑消息内容..."></textarea>
    <div class="edit-buttons">
      <button id="editCancelBtn" class="edit-btn-cancel">取消</button>
      <button id="editSaveBtn" class="edit-btn-save">保存并重新生成</button>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  let apiKey = localStorage.getItem("dsApiKey");

  // 初始化并兼容旧数据结构
  let tabData = JSON.parse(localStorage.getItem("dsTabs")) || (() => {
    const oldMsgs = JSON.parse(localStorage.getItem("dsMessages")) || [];
    return { active: "tab1", list: { tab1: { messages: oldMsgs, memoryLimit: "0" } } };
  })();

  // 数据结构迁移：将旧的纯数组结构升级为包含 memoryLimit 的对象结构
  Object.keys(tabData.list).forEach(id => {
    if (Array.isArray(tabData.list[id])) {
      tabData.list[id] = {
        messages: tabData.list[id],
        memoryLimit: "0"
      };
    }
  });

  let editingMessageIndex = -1;
  let isSending = false;
  let abortController = null; // 用于中断请求

  const chat = document.getElementById("chat");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("sendBtn");
  const tabsEl = document.getElementById("tabs");
  const addTab = document.getElementById("addTab");
  const resetBtn = document.getElementById("resetBtn");
  const keyPanel = document.getElementById("keyPanel");
  const apiKeyInput = document.getElementById("apiKeyInput");
  const saveKey = document.getElementById("saveKey");
  const editKeyBtn = document.getElementById("editKeyBtn");
  const editPanel = document.getElementById("editPanel");
  const editTextarea = document.getElementById("editTextarea");
  const editCancelBtn = document.getElementById("editCancelBtn");
  const editSaveBtn = document.getElementById("editSaveBtn");
  const scrollToBottomBtn = document.getElementById("scrollToBottomBtn");

  // 侧边栏相关元素
  const menuBtn = document.getElementById("menuBtn");
  const sidebar = document.getElementById("sidebar");
  const sidebarOverlay = document.getElementById("sidebarOverlay");

  // 记忆条数相关元素
  const memorySelect = document.getElementById("memorySelect");
  const memoryCustom = document.getElementById("memoryCustom");

  // 复制图标SVG
  const copyIconSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
  // 删除图标SVG
  const deleteIconSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`;

  // 初始化API Key
  if (!apiKey) {
    keyPanel.classList.remove("hidden");
  } else {
    apiKeyInput.value = apiKey;
  }

  // 保存标签数据
  function saveTabs() {
    localStorage.setItem("dsTabs", JSON.stringify(tabData));
  }

  // --- 记忆条数逻辑 (针对当前对话) ---
  function updateMemoryUI() {
    const currentTab = tabData.list[tabData.active];
    if (!currentTab) return;

    const limit = currentTab.memoryLimit || "0";
    if (["0", "200", "100", "50"].includes(limit)) {
      memorySelect.value = limit;
      memoryCustom.classList.add("hidden");
    } else {
      memorySelect.value = "custom";
      memoryCustom.value = limit;
      memoryCustom.classList.remove("hidden");
    }
  }

  memorySelect.addEventListener("change", (e) => {
    const val = e.target.value;
    if (val === "custom") {
      memoryCustom.classList.remove("hidden");
      memoryCustom.focus();
      const customVal = parseInt(memoryCustom.value) || 10;
      memoryCustom.value = customVal;
      tabData.list[tabData.active].memoryLimit = customVal.toString();
    } else {
      memoryCustom.classList.add("hidden");
      tabData.list[tabData.active].memoryLimit = val;
    }
    saveTabs();
  });

  memoryCustom.addEventListener("input", (e) => {
    const val = parseInt(e.target.value);
    if (!isNaN(val) && val >= 0) {
      tabData.list[tabData.active].memoryLimit = val.toString();
      saveTabs();
    }
  });

  // --- 侧边栏逻辑 ---
  let isSidebarOpen = false;

  function openSidebar() {
    isSidebarOpen = true;
    sidebar.classList.remove("-translate-x-full");
    sidebarOverlay.classList.remove("opacity-0", "pointer-events-none");
    sidebarOverlay.classList.add("opacity-100", "pointer-events-auto");
  }

  function closeSidebar() {
    isSidebarOpen = false;
    sidebar.classList.add("-translate-x-full");
    sidebarOverlay.classList.remove("opacity-100", "pointer-events-auto");
    sidebarOverlay.classList.add("opacity-0", "pointer-events-none");
  }

  menuBtn.addEventListener("click", openSidebar);
  sidebarOverlay.addEventListener("click", closeSidebar);

  let touchStartX = 0;
  let touchEndX = 0;

  document.addEventListener('touchstart', e => {
    touchStartX = e.changedTouches[0].screenX;
  }, { passive: true });

  document.addEventListener('touchend', e => {
    touchEndX = e.changedTouches[0].screenX;
    handleSwipe();
  }, { passive: true });

  function handleSwipe() {
    const swipeDist = touchEndX - touchStartX;
    if (swipeDist > 50 && touchStartX < 30 && !isSidebarOpen) {
      openSidebar();
    }
    if (swipeDist < -50 && isSidebarOpen) {
      closeSidebar();
    }
  }

  // 保存API Key
  saveKey.onclick = () => {
    const newKey = apiKeyInput.value.trim();
    if (!newKey || !newKey.startsWith("sk-")) {
      return alert("请输入有效的以sk-开头的API Key！");
    }
    if (newKey.length < 20) {
      alert("API Key长度过短，可能是无效的Key，请检查！");
      return;
    }
    apiKey = newKey;
    localStorage.setItem("dsApiKey", apiKey);
    keyPanel.classList.add("hidden");
    alert("Key保存成功，可正常使用！");
  };

  // 修改API Key
  editKeyBtn.onclick = () => {
    closeSidebar();
    apiKeyInput.value = apiKey || "";
    keyPanel.classList.remove("hidden");
    apiKeyInput.focus();
  };

  // 渲染标签 (侧边栏内)
  function renderTabs() {
    tabsEl.innerHTML = "";
    const tabIds = Object.keys(tabData.list);
    if (tabIds.length === 0) {
      tabData.list = { tab1: { messages: [], memoryLimit: "0" } };
      tabData.active = "tab1";
      saveTabs();
    }

    Object.keys(tabData.list).forEach(id => {
      const tabDiv = document.createElement("div");
      tabDiv.className = `tab ${id === tabData.active ? "active" : ""}`;
      tabDiv.innerHTML = `
        <span class="truncate pr-2">对话 ${id.replace("tab", "")}</span>
        <span class="tab-del flex-shrink-0" data-id="${id}">×</span>
      `;
      tabDiv.addEventListener("click", (e) => {
        if (e.target.classList.contains("tab-del")) return;
        tabData.active = id;
        saveTabs();
        updateMemoryUI(); // 切换对话时更新记忆条数UI
        renderChat();
        renderTabs();
        if(window.innerWidth < 768) closeSidebar();
      });
      tabsEl.appendChild(tabDiv);
    });

    document.querySelectorAll(".tab-del").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const delId = btn.dataset.id;
        const tabIds = Object.keys(tabData.list);
        if (tabIds.length <= 1) {
          alert("至少保留1个对话，无法删除！");
          return;
        }
        if (confirm(`确定删除「对话 ${delId.replace("tab", "")}」吗？删除后记录将永久消失！`)) {
          delete tabData.list[delId];
          if (delId === tabData.active) {
            tabData.active = Object.keys(tabData.list)[0];
          }
          saveTabs();
          updateMemoryUI();
          renderChat();
          renderTabs();
        }
      });
    });
  }

  // 复制文本
  function copyText(text) {
    if (!text) return alert("暂无内容可复制");
    navigator.clipboard.writeText(text).then(() => {
      console.log("复制成功");
    }).catch(err => {
      alert("复制失败，请手动复制！");
      console.error("复制错误：", err);
    });
  }

  // 获取最后一条用户消息的索引
  function getLastUserMessageIndex() {
    const currentMsgs = tabData.list[tabData.active].messages || [];
    for (let i = currentMsgs.length - 1; i >= 0; i--) {
      if (currentMsgs[i].role === 'user') return i;
    }
    return -1;
  }

  // 滚动到底部函数
  function scrollToBottom() {
    chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
  }

  // 检查滚动按钮显示状态
  function checkScrollButton() {
    const distanceFromBottom = chat.scrollHeight - chat.scrollTop - chat.clientHeight;
    if (distanceFromBottom > 200) {
      scrollToBottomBtn.classList.add('visible');
    } else {
      scrollToBottomBtn.classList.remove('visible');
    }
  }

  // 编辑用户消息
  function editUserMessage(messageIndex) {
    const currentMsgs = tabData.list[tabData.active].messages || [];
    if (messageIndex < 0 || messageIndex >= currentMsgs.length) return alert("消息索引无效。");
    const targetMessage = currentMsgs[messageIndex];
    if (targetMessage.role !== 'user') return alert("只能编辑用户消息。");

    editingMessageIndex = messageIndex;
    editTextarea.value = targetMessage.content;
    editPanel.classList.remove("hidden");
    editTextarea.focus();
  }

  // 重新生成回复
  function regenerateResponse(messageIndex) {
    if (!apiKey) { keyPanel.classList.remove("hidden"); return; }
    const currentMsgs = tabData.list[tabData.active].messages || [];
    if (currentMsgs.length === 0) return alert("当前对话为空，无法重新生成。");
    if (messageIndex < 0 || messageIndex >= currentMsgs.length) return alert("消息索引无效。");
    const targetMessage = currentMsgs[messageIndex];
    if (targetMessage.role !== 'assistant') return alert("只能重新生成AI的回复。");

    fetchAndStreamResponse({ regenerateIndex: messageIndex });
  }

  // 渲染聊天记录
  function renderChat() {
    const currentMsgs = tabData.list[tabData.active].messages || [];
    const lastUserMsgIndex = getLastUserMessageIndex();

    chat.innerHTML = currentMsgs.map((m, i) => {
      const isUser = m.role === 'user';
      const isAssistant = m.role === 'assistant';
      const isLastAssistant = isAssistant && i === currentMsgs.length - 1;
      const isLastUserMessage = i === lastUserMsgIndex;

      let buttons = '';
      
      // 添加删除按钮（所有消息都支持）
      buttons += `<button class="delete-btn" data-index="${i}" title="删除">${deleteIconSvg}</button>`;

      if (isAssistant) {
        buttons += `<button class="copy-btn" data-index="${i}" title="复制">${copyIconSvg}</button>`;
        if (isLastAssistant) {
          buttons += `<button class="regenerate-btn" data-index="${i}" title="重新生成">↻</button>`;
        }
      } else if (isUser) {
        buttons += `<button class="copy-btn" data-index="${i}" title="复制">${copyIconSvg}</button>`;
        if (isLastUserMessage) {
          buttons += `<button class="edit-btn" data-index="${i}" title="编辑">✎</button>`;
        }
      }

      // 历史版本控制 UI
      let versionHtml = '';
      if (isAssistant && m.history && m.history.length > 1) {
        const hIndex = m.historyIndex || 0;
        const isFirst = hIndex === 0;
        const isLast = hIndex === m.history.length - 1;
        versionHtml = `
          <div class="version-control">
            <span class="version-btn prev-version-btn ${isFirst ? 'disabled' : ''}" data-index="${i}">❮</span>
            <span>${hIndex + 1} / ${m.history.length}</span>
            <span class="version-btn next-version-btn ${isLast ? 'disabled' : ''}" data-index="${i}">❯</span>
          </div>
        `;
      }

      return `
        <div id="msg-${i}" class="message-box p-3 rounded-xl ${isUser?'bg-blue-600 ml-auto':'bg-gray-800 mr-auto'} max-w-[85%] text-white">
          ${versionHtml}
          ${buttons}
          <div class="msg-content">${(m.content||'').replace(/\n/g, '<br>')}</div>
        </div>
      `;
    }).join("");

    // 绑定复制事件
    document.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const index = parseInt(this.getAttribute('data-index'));
        const currentMsgs = tabData.list[tabData.active].messages || [];
        if (currentMsgs[index]) copyText(currentMsgs[index].content);

        const originalHtml = this.innerHTML;
        this.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
        setTimeout(() => { this.innerHTML = originalHtml; }, 1500);
      });
    });

    // 绑定编辑事件
    document.querySelectorAll('.edit-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const index = parseInt(this.getAttribute('data-index'));
        editUserMessage(index);
      });
    });

    // 绑定重新生成事件
    document.querySelectorAll('.regenerate-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const index = parseInt(this.getAttribute('data-index'));
        regenerateResponse(index);
      });
    });

    // 绑定删除事件
    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const index = parseInt(this.getAttribute('data-index'));
        if (confirm("确定删除这条消息吗？")) {
          tabData.list[tabData.active].messages.splice(index, 1);
          saveTabs();
          renderChat();
        }
      });
    });

    // 绑定历史版本切换事件
    document.querySelectorAll('.prev-version-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        if (this.classList.contains('disabled')) return;
        const index = parseInt(this.getAttribute('data-index'));
        const msg = tabData.list[tabData.active].messages[index];
        if (msg.historyIndex > 0) {
          msg.historyIndex--;
          msg.content = msg.history[msg.historyIndex];
          saveTabs();
          renderChat();
        }
      });
    });

    document.querySelectorAll('.next-version-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        if (this.classList.contains('disabled')) return;
        const index = parseInt(this.getAttribute('data-index'));
        const msg = tabData.list[tabData.active].messages[index];
        if (msg.historyIndex < msg.history.length - 1) {
          msg.historyIndex++;
          msg.content = msg.history[msg.historyIndex];
          saveTabs();
          renderChat();
        }
      });
    });

    chat.scrollTop = chat.scrollHeight;
    setTimeout(checkScrollButton, 50);
  }

  // 保存编辑并重新生成 (用户消息)
  async function saveEditAndRegenerate() {
    const newContent = editTextarea.value.trim();
    if (!newContent) return alert("消息内容不能为空！");
    const currentMsgs = tabData.list[tabData.active].messages || [];
    if (editingMessageIndex < 0 || editingMessageIndex >= currentMsgs.length) return alert("编辑的消息不存在。");

    currentMsgs[editingMessageIndex].content = newContent;
    // 用户编辑消息会截断后面的对话
    const messagesToKeep = currentMsgs.slice(0, editingMessageIndex + 1);
    tabData.list[tabData.active].messages = messagesToKeep;
    saveTabs();

    editPanel.classList.add("hidden");
    editingMessageIndex = -1;
    renderChat();
    await fetchAndStreamResponse();
  }

  function cancelEdit() {
    editPanel.classList.add("hidden");
    editingMessageIndex = -1;
  }

  function autoHeight() {
    input.style.height = "auto";
    const scrollH = input.scrollHeight;
    input.style.height = Math.min(Math.max(scrollH, 44), 88) + "px";
  }

  input.addEventListener("input", autoHeight);
  autoHeight();

  // 新建对话
  addTab.onclick = () => {
    const tabIds = Object.keys(tabData.list);
    let maxIdNum = 0;
    tabIds.forEach(id => {
      const num = parseInt(id.replace('tab', ''), 10);
      if (num > maxIdNum) maxIdNum = num;
    });

    const newId = `tab${maxIdNum + 1}`;
    tabData.list[newId] = { messages: [], memoryLimit: "0" };
    tabData.active = newId;
    saveTabs();
    updateMemoryUI();
    renderChat();
    renderTabs();
    closeSidebar();
    input.focus();
  };

  // 清空当前对话
  resetBtn.onclick = () => {
    if (!confirm("确定清空当前对话的所有记录吗？清空后无法恢复！")) return;
    tabData.list[tabData.active].messages = [];
    saveTabs();
    renderChat();
    closeSidebar();
  };

  // API请求和流式处理
  async function fetchAndStreamResponse(opts = {}) {
    isSending = true;
    sendBtn.textContent = "停止";
    sendBtn.classList.add("stop-mode");
    
    abortController = new AbortController();

    const currentMsgs = tabData.list[tabData.active].messages || [];
    const isRegen = opts.regenerateIndex !== undefined;
    const targetIndex = isRegen ? opts.regenerateIndex : currentMsgs.length;

    // --- 核心逻辑：根据当前对话的设置截取发送给API的上下文 ---
    let limit = parseInt(tabData.list[tabData.active].memoryLimit || "0");
    let payloadMsgs = isRegen ? currentMsgs.slice(0, targetIndex) : currentMsgs;
    
    // 过滤掉自定义的 history 属性，避免污染 API 请求
    payloadMsgs = payloadMsgs.map(m => ({ role: m.role, content: m.content }));

    if (limit > 0 && payloadMsgs.length > limit) {
      payloadMsgs = payloadMsgs.slice(-limit);
    }
    // ------------------------------------------------

    const isAtBottom = chat.scrollTop + chat.clientHeight >= chat.scrollHeight - 20;
    let aiMsgDiv;

    if (isRegen) {
      aiMsgDiv = document.getElementById(`msg-${targetIndex}`);
      if (!currentMsgs[targetIndex].history) {
        currentMsgs[targetIndex].history = [currentMsgs[targetIndex].content];
        currentMsgs[targetIndex].historyIndex = 0;
      }
      currentMsgs[targetIndex].history.push("");
      currentMsgs[targetIndex].historyIndex = currentMsgs[targetIndex].history.length - 1;
      currentMsgs[targetIndex].content = "";
      
      const contentDiv = aiMsgDiv.querySelector('.msg-content');
      if (contentDiv) contentDiv.innerHTML = "";
    } else {
      aiMsgDiv = document.createElement("div");
      aiMsgDiv.id = `msg-${targetIndex}`;
      aiMsgDiv.className = "message-box p-3 rounded-xl bg-gray-800 mr-auto max-w-[85%] text-white";
      aiMsgDiv.innerHTML = `<button class="copy-btn" title="复制">${copyIconSvg}</button><div class="msg-content"></div>`;
      chat.appendChild(aiMsgDiv);
    }

    if (isAtBottom) chat.scrollTop = chat.scrollHeight;

    let fullContent = "";
    try {
      const res = await fetch("https://api.deepseek.com/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${apiKey}`,
          "Cache-Control": "no-cache",
          "Pragma": "no-cache"
        },
        body: JSON.stringify({
          model: "deepseek-chat",
          messages: payloadMsgs,
          stream: true,
          temperature: 0.7,
          max_tokens: 4096
        }),
        signal: abortController.signal
      });

      if (!res.ok) {
        const errorData = await res.json();
        throw new Error(`API请求失败：${errorData.error?.message || '请检查API Key是否有效'}`);
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value);
        const lines = chunk.split("\n").filter(line => line.trim() !== "");

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const dataStr = line.slice(6);
          if (dataStr === "[DONE]") break;

          try {
            const data = JSON.parse(dataStr);
            const content = data.choices[0].delta.content || "";
            fullContent += content;

            const contentDiv = aiMsgDiv.querySelector('.msg-content');
            if (contentDiv) {
              contentDiv.innerHTML = fullContent.replace(/\n/g, '<br>');
            }

            const currentIsAtBottom = chat.scrollTop + chat.clientHeight >= chat.scrollHeight - 20;
            if (currentIsAtBottom) chat.scrollTop = chat.scrollHeight;
          } catch (e) { continue; }
        }
      }

      // 正常完成时保存
      if (isRegen) {
        currentMsgs[targetIndex].content = fullContent;
        currentMsgs[targetIndex].history[currentMsgs[targetIndex].historyIndex] = fullContent;
      } else {
        currentMsgs.push({ 
          role: "assistant", 
          content: fullContent,
          history: [fullContent],
          historyIndex: 0
        });
      }
      tabData.list[tabData.active].messages = currentMsgs;
      saveTabs();
      renderChat();

    } catch (e) {
      if (e.name === 'AbortError') {
        // 用户主动中断时，保存已生成的部分内容
        if (isRegen) {
          currentMsgs[targetIndex].content = fullContent;
          currentMsgs[targetIndex].history[currentMsgs[targetIndex].historyIndex] = fullContent;
        } else {
          currentMsgs.push({ 
            role: "assistant", 
            content: fullContent,
            history: [fullContent],
            historyIndex: 0
          });
        }
        tabData.list[tabData.active].messages = currentMsgs;
        saveTabs();
        renderChat();
      } else {
        const contentDiv = aiMsgDiv.querySelector('.msg-content');
        const errorMsg = `<span class="text-red-400">❌ 错误：${e.message}</span>`;
        if (contentDiv) {
          contentDiv.innerHTML = errorMsg;
        }
        
        if (isRegen) {
          currentMsgs[targetIndex].content = errorMsg;
          currentMsgs[targetIndex].history[currentMsgs[targetIndex].historyIndex] = errorMsg;
          tabData.list[tabData.active].messages = currentMsgs;
          saveTabs();
        }

        console.error("发送消息错误：", e);

        if (e.message.includes("API请求失败") || e.message.includes("Key")) {
          setTimeout(() => {
            if (confirm("检测到API Key可能无效，是否立即修改？")) {
              editKeyBtn.click();
            }
          }, 1000);
        }
      }
    } finally {
      isSending = false;
      sendBtn.textContent = "发送";
      sendBtn.classList.remove("stop-mode");
      abortController = null;
    }
  }

  // 发送消息
  async function sendMessage() {
    const text = input.value.trim();
    if (!text) { input.focus(); return; }
    if (!apiKey) { keyPanel.classList.remove("hidden"); return; }

    const currentMsgs = tabData.list[tabData.active].messages || [];
    currentMsgs.push({ role: "user", content: text });
    tabData.list[tabData.active].messages = currentMsgs;
    saveTabs();
    renderChat();

    input.value = "";
    autoHeight();
    await fetchAndStreamResponse();
  }

  // 发送按钮点击逻辑：如果正在发送则中断，否则发送消息
  sendBtn.addEventListener("click", () => {
    if (isSending) {
      if (abortController) abortController.abort();
    } else {
      sendMessage();
    }
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      if (!isSending) {
        sendMessage();
      }
    }
  });

  editCancelBtn.addEventListener("click", cancelEdit);
  editSaveBtn.addEventListener("click", saveEditAndRegenerate);
  editPanel.addEventListener("click", function(e) { if (e.target === editPanel) cancelEdit(); });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && !editPanel.classList.contains('hidden')) cancelEdit();
  });

  scrollToBottomBtn.addEventListener("click", scrollToBottom);
  chat.addEventListener("scroll", checkScrollButton);

  // 初始加载
  updateMemoryUI();
  renderTabs();
  renderChat();
  setTimeout(checkScrollButton, 100);
  input.focus();
});
</script>
</body>
</html>
